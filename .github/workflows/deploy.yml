name: Deploy to Server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_MODEL: Qwen/Qwen2.5-72B-Instruct
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          echo "🚀 开始部署到服务器..."
          
          APP_DIR="/www/wwwroot/ai-headhunter"
          
          # 1. 同步所有文件（包括 .next 构建产物）
          rsync -avz --delete \
            -e "ssh -p $SERVER_PORT -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            --exclude='node_modules' \
            ./ \
            $SERVER_USER@$SERVER_HOST:$APP_DIR/
          
          # 2. 在服务器上安装依赖并重启
          ssh -p $SERVER_PORT -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << ENDSSH
            set -e
            
            cd "$APP_DIR"
            
            # 安装生产依赖
            npm ci --production
            
            # 重启 PM2 进程
            pm2 restart ai-headhunter || pm2 start npm --name "ai-headhunter" -- start
            
            echo "✅ 部署完成"
          ENDSSH
          
          echo "🎉 部署成功！"
